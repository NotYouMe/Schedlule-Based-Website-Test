<!DOCTYPE html>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGrid | Thought Orchestrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>MindGrid <span class="badge">v1.0</span></h1>
            <div id="live-clock">00:00:00</div>
        </header>

        <main>
            <section class="input-box">
                <h3>Capture Thought</h3>
                <div class="form-group">
                    <input type="text" id="task-input" placeholder="What's on your mind?">
                    <input type="time" id="time-input">
                    <button id="add-btn">Assign to Grid</button>
                </div>
            </section>

            <section class="timetable-container">
                <div class="grid-header">
                    <h2>Daily Schedule</h2>
                    <button id="clear-data" class="secondary-btn">Clear All</button>
                </div>
                <div id="timetable-grid" class="grid">
                    </div>
            </section>
        </main>
    </div>

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
 
    <div id="auth-container">
    <div class="auth-card">
        <h2>MindGrid Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <div class="auth-buttons">
            <button id="login-btn">Login</button>
            <button id="signup-btn" class="secondary-btn">Sign Up</button>
        </div>
    </div>
</div>

<div id="main-app" style="display: none;">
    <button id="logout-btn" style="float: right;">Logout</button>
    </div>
    
</body>
</html>
